run_name: default
sims:
  random_seed: 0
  redshifts_per_sed: 100
  min_redshift: 0.01
  max_redshift: 2.0
  min_mag: 18.0
  max_mag: 22.0
  bandpasses:
  - lsstu
  - lsstg
  - lsstr
  - lssti
  - lsstz
  - lssty
lgsm:
  model_name: default_model
  vae:
    encoder_layers:
    - 32
    intrinsic_latent_size: 3
    decoder_layers:
    - 8
    - 16
    - 32
    wave_bins: 64
    wave_min: 1000.0
    wave_max: 11000.0
    normalize_at: 4000.0
    sed_unit: mag
    batch_norm: true
  physics_layer:
    bandpasses:
    - lsstu
    - lsstg
    - lsstr
    - lssti
    - lsstz
    - lssty
    band_oversampling: 201
  training:
    losses:
      MSE: {}
      SlopeLoss:
        eta: 0.01
    optimizer:
      adam:
        learning_rate: 0.001
    batch_size: 128
    epochs: 300
    validation_split: 0.2
plotting:
  model_losses:
    format: png
    subplots_settings:
      nrows: 3
      ncols: 1
      figsize:
      - 4
      - 7
      constrained_layout: true
      dpi: 120
    plot_settings:
      yscale: log
  model_predictions:
    format: png
    plot_unit: mag
    ncols_train: 2
    ncols_val: 2
    seed: 0
    subplots_settings:
      nrows: 5
      figsize:
      - 10
      - 12
      constrained_layout: true
      dpi: 120
    ax_settings:
      xlabel: Wavelength (AA)
      ylabel: AB Magnitude
    predicted:
      sed_settings:
        c: C1
      photometry_settings:
        facecolors: C1
        edgecolors: k
        zorder: 10
    truth:
      sed_settings:
        c: C0
      photometry_settings:
        facecolors: C0
        edgecolors: k
        zorder: 10
